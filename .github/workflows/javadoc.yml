name: Generar Javadoc

# Solo ejecutarlo cuando haya cambios en stable
on:
  push:
    branches:
      - stable

jobs:
  build:
    name: Generar Javadoc y publicar en GitHub Pages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Crear carpeta docs
      run: mkdir -p docs

    - name: Generar Javadoc
      run: javadoc -d docs -encoding UTF-8 -charset UTF-8 src/main/java/com/tt1/test/*.java

    - name: Publicar en GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages